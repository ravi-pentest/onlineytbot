name: News Bot Auto Run

on:
  schedule:
    - cron: '0 * * * *' # සෑම පැයකටම වරක් ස්වයංක්‍රීයව ක්‍රියාත්මක වේ
  workflow_dispatch: # අපිට ඕන වෙලාවක බටන් එක ඔබලා රන් කරන්න

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4 newspaper3k deep_translator lxml_html_clean

      - name: Run Python Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
