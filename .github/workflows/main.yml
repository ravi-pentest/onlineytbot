name: News Bot Auto Run

on:
  schedule:
    # සෑම විනාඩි 15කට වරක් ස්වයංක්‍රීයව ක්‍රියාත්මක වීමට
    - cron: '*/15 * * * *'
  workflow_dispatch: # Manual run කිරීමට

# එකම අවස්ථාවේ ධාවනයන් කිහිපයක් පෝලිමේ පිරීම වැළැක්වීමට
concurrency:
  group: news-bot-sync
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    # GitHub වෙත ගොනු සේව් කිරීමට අවශ්‍ය permissions ලබා දීම
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # පද්ධතියට අවශ්‍ය සියලුම Libraries මෙහි ඇතුළත් කර ඇත
          pip install requests beautifulsoup4 newspaper3k deep_translator lxml_html_clean flask schedule

      - name: Run Python Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        # මෙහිදී main.py එක තුල loop එකක් නොමැති බව තහවුරු කරගන්න
        run: python main.py

      # processed_urls.txt ගොනුව Repository එකට සේව් කිරීම
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # processed_urls.txt ගොනුව නැතිනම් සාදා ගැනීම
          touch processed_urls.txt
          git add processed_urls.txt
          git commit -m "Update processed URLs [skip ci]" || echo "No changes to commit"
          git push || echo "Push failed or no changes"
