name: News Bot Auto Run

on:
  schedule:
    # සෑම විනාඩි 05කට වරක්ම ස්වයංක්‍රීයව ක්‍රියාත්මක වීමට
    - cron: '*/5 * * * *'
  workflow_dispatch: # Manual run කිරීමට

concurrency:
  group: news-bot-sync
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        # මෙන්න මෙතැන නිවැරදි කර ඇත: actions/checkout@v3
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 newspaper3k deep_translator lxml_html_clean flask schedule

      - name: Run Python Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          touch processed_urls.txt
          git add processed_urls.txt
          git commit -m "Update processed URLs [skip ci]" || echo "No changes to commit"
          git push || echo "Push failed or no changes"
